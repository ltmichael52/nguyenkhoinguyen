<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KeyPiano By NKN - Full Keyboard</title>
    <style>
        body { background: #0d0d0d; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #piano-app { width: 920px; background: #1a1a1a; padding: 25px; border-radius: 20px; color: white; border: 1px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .logo { color: #f1c40f; font-weight: bold; font-size: 18px; }
        
        /* Khu vực hiển thị bàn phím PC */
        .keyboard-pc { background: #252525; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; align-items: center; margin-bottom: 20px; }
        .kb-row { display: flex; gap: 6px; }
        .key-visual { 
            width: 38px; height: 38px; background: #333; color: #aaa; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; 
            font-size: 12px; transition: all 0.05s; border: 1px solid #444; box-shadow: 0 3px 0 #111;
        }
        /* Hiệu ứng Highlight khi ấn phím */
        .key-visual.active { background: #f1c40f !important; color: #000; transform: translateY(3px); box-shadow: none !important; border-color: #fff; }

        /* Đàn Piano */
        #piano-container { background: #000; padding: 15px 0; border-radius: 12px; position: relative; }
        #piano-keys { position: relative; height: 180px; width: 880px; margin: 0 auto; display: flex; }
        .white-key { width: 40px; height: 100%; background: white; border: 1px solid #bbb; border-radius: 0 0 6px 6px; flex-shrink: 0; cursor: pointer; }
        .white-key.p-active { background: #ddd; }
        .black-key { width: 26px; height: 110px; background: #000; position: absolute; z-index: 2; border-radius: 0 0 4px 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="piano-app">
    <div class="top-bar">
        <div class="logo">🎹 NKN KeyPiano <span style="font-size: 11px; color: #666;">PRO</span></div>
        <div style="font-size: 12px; color: #888;">By NKN</div>
    </div>

    <div class="keyboard-pc" id="kb-display"></div>

    <div id="piano-container">
        <div id="piano-keys"></div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Mở rộng bảng nốt đầy đủ các ký tự đặc biệt
    const notesMap = {
        '1':130.81,'2':146.83,'3':164.81,'4':174.61,'5':196.00,'6':220.00,'7':246.94,'8':261.63,'9':293.66,'0':329.63,
        'Q':261.63,'W':293.66,'E':329.63,'R':349.23,'T':392.00,'Y':440.00,'U':493.88,'I':523.25,'O':587.33,'P':659.25,
        '[':698.46,']':739.99,'\\':783.99,
        'A':698.46,'S':783.99,'D':880.00,'F':987.77,'G':1046.50,'H':1174.66,'J':1318.51,'K':1396.91,'L':1567.98,
        ';':1661.22,"'":1760.00,
        'Z':1046.50,'X':1174.66,'C':1318.51,'V':1396.91,'B':1567.98,'N':1760.00,'M':1975.53,
        ',':2093.00,'.':2349.32,'/':2637.02
    };

    const activeKeys = new Set();

    function playNote(freq, k) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.8);

        // Highlight nút trên bàn phím ảo
        const el = document.getElementById('k-' + btoa(k)); // Dùng btoa để xử lý ký tự đặc biệt trong ID
        if(el) {
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 150);
        }
    }

    // Vẽ bàn phím PC (Thêm các phím mới)
    const rows = [
        ['1','2','3','4','5','6','7','8','9','0'],
        ['Q','W','E','R','T','Y','U','I','O','P','[',']','\\'],
        ['A','S','D','F','G','H','J','K','L',';',"'"],
        ['Z','X','C','V','B','N','M',',','.','/']
    ];

    rows.forEach((row, idx) => {
        const div = document.createElement('div'); div.className = 'kb-row';
        if(idx===1) div.style.marginLeft = '10px';
        if(idx===2) div.style.marginLeft = '25px';
        if(idx===3) div.style.marginLeft = '40px';
        row.forEach(k => {
            const s = document.createElement('div'); s.className='key-visual'; 
            s.id='k-'+btoa(k); s.innerText=k; 
            div.appendChild(s);
        });
        document.getElementById('kb-display').appendChild(div);
    });

    // Vẽ Piano (Giữ nguyên logic cũ cho ổn định)
    const piano = document.getElementById('piano-keys'), wKeys = ['Q','W','E','R','T','Y','U','I','O','P','A','S','D','F','G','H','J','K','L'];
    const bPat = [true, true, false, true, true, true, false];
    wKeys.forEach((k, i) => {
        const wk = document.createElement('div'); wk.className = 'white-key';
        wk.onmousedown = () => playNote(notesMap[k], k);
        piano.appendChild(wk);
        if (bPat[i % 7] && i < wKeys.length - 1) {
            const bk = document.createElement('div'); bk.className = 'black-key';
            bk.style.left = (40 * (i + 1) - 13) + "px";
            bk.onmousedown = (e) => { e.stopPropagation(); playNote(notesMap[k] * 1.05946, 'none'); };
            piano.appendChild(bk);
        }
    });

    // Xử lý phím bấm vật lý
    window.onkeydown = (e) => {
        const k = e.key.toUpperCase();
        if(notesMap[k] && !activeKeys.has(k)) {
            activeKeys.add(k);
            playNote(notesMap[k], k);
        }
    };
    window.onkeyup = (e) => activeKeys.delete(e.key.toUpperCase());
    
    // Đánh thức âm thanh khi tab quay lại
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') audioCtx.resume(); });
    window.onclick = () => audioCtx.resume();
</script>
</body>
</html>
